<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK TRIP WISHLIST PRO</title>
    
    <!-- Google tag (gtag.js) - GA4 Placeholder -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // 測定ID (G-XXXXXXXXXX) は実際のプロパティIDに置き換えてください
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        #category-options { display: none; }
        #category-options.show { display: block; animation: fadeIn 0.1s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-overlay { display: none; }
        .modal-overlay.show { display: flex; }
        
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expandable-content.expanded { max-height: 1000px; }

        .card-accent-food { border-left: 6px solid #f97316; }
        .card-accent-shop { border-left: 6px solid #a855f7; }
        .card-accent-spot { border-left: 6px solid #10b981; }
        .card-accent-museum { border-left: 6px solid #3b82f6; }
    </style>
</head>
<body class="text-slate-900 min-h-screen">
    <div class="max-w-2xl mx-auto pt-12 pb-32">
        <!-- Header Section -->
        <div class="mb-10 text-center px-4">
            <h1 class="text-5xl font-black tracking-tighter italic text-slate-800 mb-1 uppercase">UK TRIP</h1>
            <p class="text-blue-600 font-black text-xs uppercase tracking-[0.4em]">Wishlist Manager</p>
        </div>

        <!-- 新規登録フォーム -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/50 mb-8 border border-white mx-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="flex flex-col gap-1 relative" id="category-selector-container">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-wider">カテゴリー</label>
                    <button id="category-trigger" onclick="toggleCategoryMenu(event)" class="w-full flex items-center justify-between px-4 py-3 border border-slate-100 rounded-2xl bg-slate-50 text-sm hover:bg-slate-100 transition-colors">
                        <div id="selected-category-display" class="flex items-center gap-2"></div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                    </button>
                    <div id="category-options" class="absolute top-full left-0 w-full mt-2 bg-white border border-slate-100 rounded-[2rem] shadow-2xl z-50 overflow-hidden"></div>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-wider">アイテム名</label>
                    <input type="text" id="new-name" placeholder="例: フィッシュアンドチップス" class="px-4 py-3 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 text-sm bg-slate-50 font-bold placeholder:font-normal transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-wider">場所 / エリア</label>
                    <input type="text" id="new-spot" placeholder="例: London" class="px-4 py-3 border border-slate-100 rounded-2xl text-sm bg-slate-50 font-medium">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-black text-blue-500 uppercase ml-2 tracking-wider">予算目安 (£)</label>
                    <input type="number" id="new-budget" placeholder="0" class="px-4 py-3 border border-blue-100 rounded-2xl text-sm bg-blue-50/50 font-black text-blue-600 focus:ring-4 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <div class="flex flex-wrap gap-5 mb-6 ml-2">
                <label class="flex items-center gap-2.5 cursor-pointer group">
                    <input type="checkbox" id="new-is-free" class="hidden peer">
                    <div class="w-6 h-6 rounded-lg border-2 border-slate-200 flex items-center justify-center peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all group-hover:border-emerald-200">
                        <i data-lucide="check" class="text-white w-4 h-4"></i>
                    </div>
                    <span class="text-xs font-black text-slate-500 group-hover:text-slate-800 transition-colors uppercase">Free</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer group">
                    <input type="checkbox" id="new-needs-res" class="hidden peer">
                    <div class="w-6 h-6 rounded-lg border-2 border-slate-200 flex items-center justify-center peer-checked:bg-orange-500 peer-checked:border-orange-500 transition-all group-hover:border-orange-200">
                        <i data-lucide="calendar" class="text-white w-4 h-4"></i>
                    </div>
                    <span class="text-xs font-black text-slate-500 group-hover:text-slate-800 transition-colors uppercase">Resv</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer group">
                    <input type="checkbox" id="new-is-starred" class="hidden peer">
                    <div class="w-6 h-6 rounded-lg border-2 border-slate-200 flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 transition-all group-hover:border-yellow-200">
                        <i data-lucide="crown" class="text-white w-4 h-4 fill-current"></i>
                    </div>
                    <span class="text-xs font-black text-slate-500 group-hover:text-slate-800 transition-colors uppercase">Top</span>
                </label>
            </div>

            <button onclick="addItem()" class="w-full bg-slate-900 text-white py-4 rounded-[1.5rem] font-black hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-2 text-sm uppercase tracking-[0.2em]">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> Add to Trip
            </button>
        </div>

        <!-- タブ (左寄せに修正) -->
        <div class="flex justify-start gap-2 mb-8 overflow-x-auto pb-4 px-4 scrollbar-hide items-center" id="tabs-container"></div>

        <!-- リスト -->
        <div id="items-list" class="space-y-5 px-4"></div>
    </div>

    <!-- フローティング・プログレス -->
    <div class="fixed bottom-8 left-0 right-0 z-[90] pointer-events-none px-6">
        <div class="max-w-md mx-auto pointer-events-auto">
            <div class="bg-slate-50/80 backdrop-blur-xl rounded-2xl px-5 py-2.5 shadow-xl border border-white text-slate-800 flex items-center gap-4">
                <div class="flex items-center gap-2 shrink-0">
                    <span id="progress-percent" class="text-lg font-black italic tabular-nums leading-none">0%</span>
                </div>
                <div class="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-emerald-500 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
                </div>
                <div class="flex items-center gap-3 shrink-0">
                    <div class="text-right">
                        <span id="total-budget-display" class="text-xs font-black text-slate-900 tabular-nums">£0</span>
                    </div>
                    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-7 h-7 flex items-center justify-center bg-white rounded-lg text-slate-400 hover:text-slate-600 border border-slate-100 shadow-sm transition-all">
                        <i data-lucide="chevron-up" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 削除確認モーダル -->
    <div id="delete-modal" class="modal-overlay fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] p-10 max-w-xs w-full shadow-2xl text-center border border-white">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trash-2" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Delete Item?</h3>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-tighter mb-8">This action cannot be undone</p>
            <div class="flex flex-col gap-3">
                <button id="confirm-delete-btn" class="w-full py-4 bg-rose-500 text-white rounded-2xl font-black text-sm shadow-xl shadow-rose-200 hover:bg-rose-600 transition-colors uppercase tracking-widest">Delete Now</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-sm hover:bg-slate-200 transition-colors uppercase tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('uk_wishlist_items_v5')) || [];

        let activeTab = 'all';
        let expandedId = null;
        let editingId = null;
        let editingShopIdx = { itemId: null, shopIdx: null };
        let selectedCategory = 'food';
        let itemToDelete = null;

        const categoryOptions = [
            { id: 'food', label: '料理', icon: 'utensils', color: 'text-orange-500', bg: 'bg-orange-50', border: 'border-orange-100', activeBg: 'bg-orange-500' },
            { id: 'shop', label: 'お店', icon: 'shopping-bag', color: 'text-purple-500', bg: 'bg-purple-50', border: 'border-purple-100', activeBg: 'bg-purple-500' },
            { id: 'spot', label: '観光', icon: 'camera', color: 'text-emerald-500', bg: 'bg-emerald-50', border: 'border-emerald-100', activeBg: 'bg-emerald-500' },
            { id: 'museum', label: '文化', icon: 'landmark', color: 'text-blue-500', bg: 'bg-blue-50', border: 'border-blue-100', activeBg: 'bg-blue-500' }
        ];

        function trackEvent(eventName, params = {}) {
            console.log(`[GA4 Event] ${eventName}`, params);
            if (typeof gtag === 'function') {
                gtag('event', eventName, params);
            }
        }

        function init() {
            renderCategoryOptions();
            renderSelectedCategory();
            renderTabs();
            renderItems();
            window.addEventListener('click', (e) => {
                if (!e.target.closest('#category-selector-container')) {
                    const menu = document.getElementById('category-options');
                    if(menu) menu.classList.remove('show');
                }
            });
        }

        function saveToStorage() {
            localStorage.setItem('uk_wishlist_items_v5', JSON.stringify(items));
            updateProgress();
        }

        function renderCategoryOptions() {
            const container = document.getElementById('category-options');
            container.innerHTML = categoryOptions.map(opt => `
                <button onclick="selectCategory('${opt.id}')" class="w-full flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors text-left border-b border-slate-50 last:border-0 group">
                    <div class="w-8 h-8 ${opt.bg} rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="${opt.icon}" class="w-4 h-4 ${opt.color}"></i>
                    </div>
                    <span class="text-sm font-black text-slate-700 uppercase tracking-tighter">${opt.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectCategory(id) {
            selectedCategory = id;
            renderSelectedCategory();
            document.getElementById('category-options').classList.remove('show');
            trackEvent('select_form_category', { category: id });
        }

        function renderSelectedCategory() {
            const display = document.getElementById('selected-category-display');
            const opt = categoryOptions.find(o => o.id === selectedCategory);
            display.innerHTML = `
                <i data-lucide="${opt.icon}" class="w-4 h-4 ${opt.color}"></i>
                <span class="font-black text-xs uppercase tracking-tight text-slate-700">${opt.label}</span>
            `;
            lucide.createIcons();
        }

        function toggleCategoryMenu(e) {
            e.stopPropagation();
            document.getElementById('category-options').classList.toggle('show');
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            const tabs = [{ id: 'all', label: 'ALL', icon: 'zap', bg: 'bg-slate-100', color: 'text-slate-500', activeBg: 'bg-slate-800' }, ...categoryOptions];
            container.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                const tabBg = isActive ? tab.activeBg : tab.bg;
                const tabTextColor = isActive ? 'text-white' : tab.color;
                const tabBorder = isActive ? 'border-transparent' : 'border-white';
                
                return `
                <button onclick="setActiveTab('${tab.id}')" class="flex items-center gap-2 px-5 py-2.5 rounded-full font-black transition-all border-2 shrink-0 shadow-sm hover:scale-105 active:scale-95 ${tabBg} ${tabTextColor} ${tabBorder}">
                    <i data-lucide="${tab.icon}" class="w-3.5 h-3.5"></i>
                    <span class="text-[9px] uppercase tracking-widest">${tab.label}</span>
                </button>
            `}).join('');
            lucide.createIcons();
        }

        function setActiveTab(id) {
            activeTab = id;
            renderTabs();
            renderItems();
            trackEvent('filter_tab_click', { tab_id: id });
        }

        function toggleExpand(id) {
            const item = items.find(i => i.id === id);
            if (item && item.category !== 'food') return;
            expandedId = expandedId === id ? null : id;
            renderItems();
            if(expandedId) trackEvent('expand_food_detail', { item_name: item.name });
        }

        function renderItems() {
            const list = document.getElementById('items-list');
            const filtered = activeTab === 'all' ? items : items.filter(i => i.category === activeTab);
            
            filtered.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (a.isStarred !== b.isStarred) return b.isStarred ? 1 : -1;
                return b.id - a.id;
            });

            list.innerHTML = filtered.map(item => {
                const isEditing = editingId === item.id;
                const isExpanded = expandedId === item.id;
                const shopsDoneCount = (item.shops || []).filter(s => s.completed).length;
                const shopsTotalCount = (item.shops || []).length;

                const sortedShops = [...(item.shops || [])].map((s, idx) => ({...s, originalIdx: idx}))
                    .sort((a, b) => (b.isStarred ? 1 : 0) - (a.isStarred ? 1 : 0));

                return `
                <div class="bg-white rounded-[2rem] shadow-lg shadow-slate-200/50 border border-white overflow-hidden transition-all card-accent-${item.category}">
                    <div class="p-6 flex items-start gap-5 cursor-pointer" onclick="toggleExpand(${item.id})">
                        <button onclick="event.stopPropagation(); toggleComplete(${item.id})" class="mt-1 shrink-0 group">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center transition-all ${item.completed ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-200 border-2 border-slate-100 group-hover:border-emerald-200'}">
                                <i data-lucide="${item.completed ? 'check' : 'circle'}" class="w-5 h-5"></i>
                            </div>
                        </button>
                        
                        <div class="flex-1 min-w-0">
                            ${isEditing ? `
                                <div class="space-y-3 bg-slate-50 p-5 rounded-[1.5rem]" onclick="event.stopPropagation()">
                                    <input id="edit-name-${item.id}" class="w-full font-black text-sm p-3 border rounded-xl" value="${item.name}">
                                    <div class="grid grid-cols-2 gap-3">
                                        <input id="edit-spot-${item.id}" class="text-xs p-3 border rounded-xl font-bold" value="${item.spot}" placeholder="場所">
                                        <input id="edit-budget-${item.id}" type="number" class="text-xs p-3 border rounded-xl font-black text-emerald-600" value="${item.budget}" placeholder="予算">
                                    </div>
                                    <button onclick="saveEdit(${item.id})" class="w-full bg-slate-800 text-white py-3 rounded-xl text-xs font-black uppercase tracking-widest">Update</button>
                                </div>
                            ` : `
                                <div>
                                    <div class="flex items-center gap-3 flex-wrap mb-1.5">
                                        <span class="font-black text-slate-800 text-lg leading-tight ${item.completed ? 'line-through text-slate-300' : ''}">${item.name}</span>
                                        ${item.isStarred ? '<span class="text-yellow-400"><i data-lucide="crown" class="w-4 h-4 fill-current"></i></span>' : ''}
                                    </div>
                                    <div class="flex items-center gap-3 flex-wrap text-slate-400">
                                        <span class="text-[10px] font-black flex items-center gap-1.5 bg-slate-50 px-3 py-1 rounded-full"><i data-lucide="map-pin" class="w-3 h-3"></i> ${item.spot || 'LONDON'}</span>
                                        <span class="text-emerald-600 text-[11px] font-black italic">£${(item.budget || 0).toLocaleString()}</span>
                                        ${item.isFree ? '<span class="text-[8px] bg-emerald-50 text-emerald-500 px-2 py-0.5 rounded-full font-black uppercase">Free</span>' : ''}
                                        ${item.needsReservation ? '<span class="text-[8px] bg-orange-50 text-orange-500 px-2 py-0.5 rounded-full font-black uppercase">Resv</span>' : ''}
                                        ${item.category === 'food' && shopsTotalCount > 0 ? `<span class="text-[8px] ${shopsDoneCount === shopsTotalCount ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'} px-2 py-0.5 rounded-full font-black">${shopsDoneCount}/${shopsTotalCount}</span>` : ''}
                                    </div>
                                </div>
                            `}
                        </div>

                        <div class="flex items-center gap-1 shrink-0">
                            <button onclick="event.stopPropagation(); toggleEdit(${item.id})" class="p-2.5 text-slate-200 hover:text-slate-400 transition-all">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="event.stopPropagation(); askDelete(${item.id})" class="p-2.5 text-slate-200 hover:text-rose-400 transition-all">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                            ${item.category === 'food' ? `<i data-lucide="chevron-down" class="ml-1 w-4 h-4 text-slate-200 transition-transform ${isExpanded ? 'rotate-180' : ''}"></i>` : ''}
                        </div>
                    </div>
                    
                    ${item.category === 'food' ? `
                    <div class="expandable-content ${isExpanded ? 'expanded' : ''} bg-slate-50/30 border-t border-slate-100">
                        <div class="p-6 space-y-4">
                            <div class="flex gap-2">
                                <input type="text" id="shop-input-${item.id}" placeholder="店名を追加..." class="flex-1 px-4 py-2.5 text-xs border rounded-xl focus:ring-2 focus:ring-blue-100 outline-none font-bold" onclick="event.stopPropagation()">
                                <button onclick="event.stopPropagation(); addShop(${item.id})" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest">Add</button>
                            </div>
                            
                            <div class="space-y-2">
                                ${sortedShops.length > 0 ? sortedShops.map((shop) => {
                                    const idx = shop.originalIdx;
                                    const isShopEditing = editingShopIdx.itemId === item.id && editingShopIdx.shopIdx === idx;
                                    return `
                                    <div class="flex items-center justify-between bg-white p-3.5 rounded-xl border border-slate-100 shadow-sm group">
                                        <div class="flex items-center gap-3 flex-1 min-w-0">
                                            <button onclick="event.stopPropagation(); toggleShopComplete(${item.id}, ${idx})" class="shrink-0">
                                                <i data-lucide="${shop.completed ? 'check-square' : 'square'}" class="w-4 h-4 ${shop.completed ? 'text-emerald-500' : 'text-slate-200 group-hover:text-slate-400'}"></i>
                                            </button>
                                            
                                            <button onclick="event.stopPropagation(); toggleShopStar(${item.id}, ${idx})" class="shrink-0">
                                                <i data-lucide="crown" class="w-3.5 h-3.5 ${shop.isStarred ? 'text-yellow-400 fill-current' : 'text-slate-100 group-hover:text-yellow-100'}"></i>
                                            </button>

                                            ${isShopEditing ? `
                                                <input id="edit-shop-name-${item.id}-${idx}" class="flex-1 text-xs font-black border-b outline-none bg-transparent" value="${shop.name}" onblur="saveShopEdit(${item.id}, ${idx})" onkeydown="if(event.key === 'Enter') saveShopEdit(${item.id}, ${idx})" onclick="event.stopPropagation()" autoFocus>
                                            ` : `
                                                <span onclick="event.stopPropagation(); toggleShopEdit(${item.id}, ${idx})" class="text-[11px] font-black text-slate-700 truncate ${shop.completed ? 'line-through text-slate-300' : ''}">
                                                    ${shop.name}
                                                </span>
                                            `}
                                        </div>
                                        <div class="flex items-center gap-1 shrink-0 ml-2">
                                            <button onclick="event.stopPropagation(); openMap('${shop.name}', '${item.spot}')" class="p-2 text-slate-200 hover:text-blue-500 transition-all"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i></button>
                                            <button onclick="event.stopPropagation(); removeShop(${item.id}, ${idx})" class="p-2 text-slate-200 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                        </div>
                                    </div>
                                `;}).join('') : `<p class="text-[9px] text-slate-300 font-black text-center py-2 uppercase tracking-widest">No shops listed</p>`}
                            </div>
                        </div>
                    </div>` : ''}
                </div>
                `;
            }).join('');
            
            updateProgress();
            lucide.createIcons();
        }

        function addItem() {
            const nameInput = document.getElementById('new-name');
            const name = nameInput.value;
            if (!name) return;
            const newItem = {
                id: Date.now(),
                category: selectedCategory,
                name,
                spot: document.getElementById('new-spot').value || 'London',
                budget: parseInt(document.getElementById('new-budget').value) || 0,
                isFree: document.getElementById('new-is-free').checked,
                needsReservation: document.getElementById('new-needs-res').checked,
                isStarred: document.getElementById('new-is-starred').checked,
                completed: false,
                shops: []
            };
            items.unshift(newItem);
            saveToStorage();
            
            trackEvent('add_wishlist_item', { 
                item_name: newItem.name, 
                category: newItem.category,
                is_starred: newItem.isStarred 
            });

            nameInput.value = '';
            document.getElementById('new-spot').value = '';
            document.getElementById('new-budget').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            renderItems();
        }

        function toggleComplete(id) {
            items = items.map(i => {
                if(i.id === id) {
                    const nextState = !i.completed;
                    trackEvent('toggle_item_complete', { 
                        item_name: i.name, 
                        completed: nextState 
                    });
                    return {...i, completed: nextState};
                }
                return i;
            });
            saveToStorage();
            renderItems();
        }

        function toggleEdit(id) {
            editingId = editingId === id ? null : id;
            renderItems();
        }

        function saveEdit(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const spot = document.getElementById(`edit-spot-${id}`).value;
            const budget = parseInt(document.getElementById(`edit-budget-${id}`).value) || 0;
            items = items.map(i => i.id === id ? {...i, name, spot, budget} : i);
            editingId = null;
            saveToStorage();
            renderItems();
            trackEvent('save_item_edit', { item_name: name });
        }

        function askDelete(id) {
            itemToDelete = id;
            document.getElementById('delete-modal').classList.add('show');
            document.getElementById('confirm-delete-btn').onclick = () => {
                const item = items.find(i => i.id === itemToDelete);
                if(item) trackEvent('delete_item', { item_name: item.name });
                items = items.filter(i => i.id !== itemToDelete);
                saveToStorage();
                renderItems();
                closeDeleteModal();
            };
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
        }

        function addShop(itemId) {
            const input = document.getElementById(`shop-input-${itemId}`);
            const shopName = input.value.trim();
            if (!shopName) return;
            const item = items.find(i => i.id === itemId);
            items = items.map(it => {
                if (it.id === itemId) {
                    return { ...it, shops: [...(it.shops || []), { name: shopName, completed: false, isStarred: false }] };
                }
                return it;
            });
            input.value = '';
            saveToStorage();
            renderItems();
            trackEvent('add_shop_list', { item_name: item.name, shop_name: shopName });
        }

        function toggleShopComplete(itemId, index) {
            items = items.map(item => {
                if (item.id === itemId) {
                    const shops = [...item.shops];
                    shops[index].completed = !shops[index].completed;
                    trackEvent('toggle_shop_complete', { shop_name: shops[index].name, completed: shops[index].completed });
                    return { ...item, shops };
                }
                return item;
            });
            saveToStorage();
            renderItems();
        }

        function toggleShopStar(itemId, index) {
            items = items.map(item => {
                if (item.id === itemId) {
                    const shops = [...item.shops];
                    shops[index].isStarred = !shops[index].isStarred;
                    return { ...item, shops };
                }
                return item;
            });
            saveToStorage();
            renderItems();
        }

        function toggleShopEdit(itemId, index) {
            editingShopIdx = { itemId, shopIdx: index };
            renderItems();
        }

        function saveShopEdit(itemId, index) {
            const input = document.getElementById(`edit-shop-name-${itemId}-${index}`);
            if (input) {
                const newName = input.value.trim();
                if (newName) {
                    items = items.map(item => {
                        if (item.id === itemId) {
                            const shops = [...item.shops];
                            shops[index].name = newName;
                            return { ...item, shops };
                        }
                        return item;
                    });
                }
            }
            editingShopIdx = { itemId: null, shopIdx: null };
            saveToStorage();
            renderItems();
        }

        function removeShop(itemId, index) {
            items = items.map(item => {
                if (item.id === itemId) {
                    const shops = [...item.shops];
                    shops.splice(index, 1);
                    return { ...item, shops };
                }
                return item;
            });
            saveToStorage();
            renderItems();
        }

        function openMap(name, spot) {
            trackEvent('open_google_maps', { location_name: name });
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + (spot || 'UK'))}`, '_blank');
        }

        function updateProgress() {
            let total = 0; let done = 0;
            items.forEach(item => {
                total++; if (item.completed) done++;
                if (item.category === 'food') {
                    (item.shops || []).forEach(shop => {
                        total++; if (shop.completed) done++;
                    });
                }
            });
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('total-budget-display').innerText = `£${items.reduce((s, i) => s + (i.budget || 0), 0).toLocaleString()}`;
        }

        window.onload = init;
    </script>
</body>
</html>
